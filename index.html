<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>techhog / home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #10131a;
    --panel: #171b24;
    --panel-border: #2a2f3d;
    --amber: #e8a33d;
    --amber-dim: #8a6a2f;
    --text: #cfd4e0;
    --text-dim: #6b7182;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    background-image:
      linear-gradient(rgba(232,163,61,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,163,61,0.035) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  header {
    margin-bottom: 40px;
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 24px;
  }

  .eyebrow {
    color: var(--amber-dim);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 0 0 10px;
  }

  h1 {
    margin: 0 0 12px;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #f2f4f8;
  }

  .subtitle {
    margin: 0;
    font-size: 13.5px;
    color: var(--text-dim);
    font-style: italic;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 1px;
    background: var(--amber-dim);
    flex-shrink: 0;
  }

  .tool-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .tool-card {
    display: block;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    padding: 18px 20px;
    text-decoration: none;
    color: inherit;
    font-size: 13px;
    line-height: 1.55;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .tool-card:hover {
    border-color: var(--amber-dim);
    background: #191d27;
  }

  .tool-card:hover .status-dot {
    background: var(--amber);
  }

  .tool-card:hover .tool-open {
    color: var(--amber);
  }

  .tool-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 6px;
  }

  .tool-name {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .tool-open {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    transition: color 0.15s ease;
  }

  .tool-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin: 0;
    padding-left: 16px;
  }

  .empty-slot {
    border: 1px dashed var(--panel-border);
    border-radius: 4px;
    padding: 18px 20px;
    color: var(--text-dim);
    font-size: 12px;
  }

  footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--panel-border);
    color: var(--text-dim);
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">made by techhog</p>
      <h1>home</h1>
      <p class="subtitle">This site was completely vibe coded by Sonnet 5 (though not the core code of each tool)</p>
    </header>

    <p class="section-label"><span class="status-dot"></span>subpage/</p>

    <div class="tool-list">
      <a class="tool-card" href="subpage/iccephdeobf.html">
        <div class="tool-top">
          <span class="tool-name"><span class="status-dot"></span>ICCEPH V2.5 DEOBFUSCATOR</span>
          <span class="tool-open">&gt;_ open</span>
        </div>
        <p class="tool-desc">Deobfuscate code from https://icceph.vercel.app</p>
      </a>

      <div class="empty-slot">// more soon</div>
    </div>
  </div>
</body>
</html>
