<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCceph v2.5 deobfuscator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #10131a;
    --panel: #171b24;
    --panel-border: #2a2f3d;
    --amber: #e8a33d;
    --amber-dim: #8a6a2f;
    --text: #cfd4e0;
    --text-dim: #6b7182;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    background-image:
      linear-gradient(rgba(232,163,61,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,163,61,0.035) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  header {
    margin-bottom: 40px;
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 24px;
  }

  .eyebrow {
    color: var(--amber-dim);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 0 0 10px;
  }

  h1 {
    margin: 0 0 12px;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #f2f4f8;
  }

  .subtitle {
    margin: 0;
    font-size: 13.5px;
    color: var(--text-dim);
    font-style: italic;
  }

  .field {
    margin-bottom: 22px;
  }

  .field-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .field-label::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--amber-dim);
    border-radius: 1px;
  }

  .field-label.active::before {
    background: var(--amber);
  }

  textarea {
    width: 100%;
    min-height: 220px;
    resize: vertical;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.55;
    padding: 16px;
    tab-size: 2;
    transition: border-color 0.15s ease;
  }

  textarea::placeholder { color: #454b5c; }

  textarea:focus {
    outline: none;
    border-color: var(--amber-dim);
  }

  #output {
    color: #a8e6b0;
  }

  .actions {
    display: flex;
    justify-content: center;
    margin: 28px 0;
  }

  button#run {
    appearance: none;
    background: transparent;
    border: 1px solid var(--amber);
    color: var(--amber);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 12px 28px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
  }

  button#run:hover {
    background: var(--amber);
    color: #10131a;
    box-shadow: 0 0 24px rgba(232,163,61,0.25);
  }

  button#run:active {
    transform: translateY(1px);
  }

</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">made by techhog</p>
      <h1>iCceph v2.5 deobfuscator</h1>
      <p class="subtitle">This site was completely vibe coded by Sonnet 5 (except for the deobfuscation code)</p>
    </header>

    <div class="field">
      <div class="field-label">Input</div>
      <textarea id="input" placeholder="Paste obfuscated code here..." spellcheck="false"></textarea>
    </div>

    <div class="actions">
      <button id="run">&gt;_ deobfuscate</button>
    </div>

    <div class="field">
      <div class="field-label" id="output-label">Output</div>
      <textarea id="output" placeholder="Deobfuscated code will appear here..." spellcheck="false" readonly></textarea>
    </div>

  </div>

  <script>
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const outputLabel = document.getElementById("output-label");
    const runBtn = document.getElementById("run");

    function deobfuscate(code) {
      const table_regex = /\{([^\}]+)\}/;
      const table_result = table_regex.exec(code);
      if (!table_result)
        return "failed to deobfuscate (1)";

      const key_regex = /\] \- (\d+)/;
      const key_result = key_regex.exec(code);
      if (!key_result)
        return "failed to deobfuscate (2)";

      const table_code = table_result[1];
      const table_values = table_code.split(",");

      const key = parseInt(key_result[1]);
      if (Number.isNaN(key))
        return "failed to deobfuscate (3)";

      const bytes = [];
      for (let i = 0; i < table_values.length; i++) {
        const value = parseInt(table_values[i]) - key;
        if (Number.isNaN(value))
          return "failed to deobfuscate (4)";

        bytes[i] = value;
      }

      return String.fromCharCode.apply(null, bytes);
    }

    runBtn.addEventListener("click", () => {
      output.value = deobfuscate(input.value);
      outputLabel.classList.add("active");
    });
  </script>
</body>
</html>
